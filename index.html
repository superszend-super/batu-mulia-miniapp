<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batu Mulia - Meja Gudang</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="loading" class="screen active">
            <div class="spinner"></div>
            <p>Memuat Meja Gudang...</p>
        </div>
        <div id="main-screen" class="screen">
            <div class="header">
                <div class="player-info"><span id="username">Pemain</span></div>
                <div class="resources">
                    <div class="balance">💰 <span id="balance">0</span></div>
                    <div class="batu-mentah">🪨 <span id="batuMentah">0</span></div>
                </div>
            </div>
            <div class="meja-container">
                <h3>🏭 MEJA GUDANG</h3>
                <div class="slot-grid" id="slotGrid"></div>
            </div>
            <div class="action-panel" id="actionPanel">
                <p>👆 Tap slot untuk memecah batu</p>
            </div>
            <div class="bottom-nav">
                <button class="nav-btn active" onclick="showTab('meja')">🏠 Meja</button>
                <button class="nav-btn" onclick="showTab('inventory')">🎒 Inventory</button>
                <button class="nav-btn" onclick="showTab('toko')">🏪 Toko</button>
                <button class="nav-btn" onclick="showTab('pasar')">🤝 Pasar</button>
            </div>
        </div>
        <div id="inventory-screen" class="screen">
            <div class="header">
                <button class="back-btn" onclick="showTab('meja')">◀</button>
                <h3>🎒 Inventory</h3>
                <div></div>
            </div>
            <div class="inventory-list" id="inventoryList"></div>
        </div>
        <div id="toko-screen" class="screen">
            <div class="header">
                <button class="back-btn" onclick="showTab('meja')">◀</button>
                <h3>🏪 Toko</h3>
                <div></div>
            </div>
            <div class="toko-content">
                <div class="toko-item">
                    <span>🪨 Batu Mentah</span>
                    <span>500 STN</span>
                    <button onclick="buyBatu(1)">Beli 1</button>
                    <button onclick="buyBatu(5)">Beli 5</button>
                </div>
                <div class="toko-item">
                    <span>🔧 Gerinda Baru</span>
                    <span>10.000 STN</span>
                    <button onclick="buyGerinda()">Beli</button>
                </div>
            </div>
        </div>
        <div id="pasar-screen" class="screen">
            <div class="header">
                <button class="back-btn" onclick="showTab('meja')">◀</button>
                <h3>🤝 Pasar</h3>
                <div></div>
            </div>
            <div class="pasar-tabs">
                <button class="pasar-tab active" onclick="loadPasarBeli()">Beli</button>
                <button class="pasar-tab" onclick="loadPasarJual()">Jual</button>
            </div>
            <div class="pasar-list" id="pasarList"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
