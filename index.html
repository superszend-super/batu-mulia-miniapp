<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batu Mulia - Meja Gudang</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Library Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        
        <!-- LOADING SCREEN -->
        <div id="loading" class="screen active">
            <div class="spinner"></div>
            <p>Memuat Meja Gudang...</p>
        </div>
        
        <!-- MAIN SCREEN - MEJA -->
        <div id="main-screen" class="screen">
            <div class="header">
                <div class="player-info">
                    <span id="username">Pemain</span>
                </div>
                <div class="resources">
                    <div class="balance">💰 <span id="balance">0</span> STN</div>
                    <div class="batu-mentah">🪨 <span id="batuMentah">0</span></div>
                </div>
            </div>
            
            <div class="meja-container">
                <h3>🏭 MEJA GUDANG</h3>
                <div class="slot-grid" id="slotGrid"></div>
            </div>
            
            <div class="action-panel" id="actionPanel">
                <p>👆 Tap slot untuk memecah batu</p>
            </div>
            
            <div class="bottom-nav">
                <button class="nav-btn active" data-tab="meja">🏠 Meja</button>
                <button class="nav-btn" data-tab="inventory">🎒 Inventory</button>
                <button class="nav-btn" data-tab="toko">🏪 Toko</button>
                <button class="nav-btn" data-tab="pasar">🤝 Pasar</button>
            </div>
        </div>
        
        <!-- INVENTORY SCREEN -->
        <div id="inventory-screen" class="screen">
            <div class="header">
                <button class="back-btn" data-tab="meja">◀</button>
                <h3>🎒 Inventory</h3>
                <div></div>
            </div>
            <div class="inventory-list" id="inventoryList">
                <p style="text-align:center;padding:20px;">Memuat inventory...</p>
            </div>
        </div>
        
        <!-- TOKO SCREEN -->
        <div id="toko-screen" class="screen">
            <div class="header">
                <button class="back-btn" data-tab="meja">◀</button>
                <h3>🏪 Toko</h3>
                <div></div>
            </div>
            <div class="toko-content">
                <div class="toko-item">
                    <div>
                        <span style="font-weight:bold;">🪨 Batu Mentah</span><br>
                        <span style="font-size:12px;opacity:0.7;">500 STN / batu</span>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button onclick="buyBatu(1)">Beli 1</button>
                        <button onclick="buyBatu(5)">Beli 5</button>
                    </div>
                </div>
                <div class="toko-item">
                    <div>
                        <span style="font-weight:bold;">🔧 Gerinda Baru</span><br>
                        <span style="font-size:12px;opacity:0.7;">10.000 STN (50x pakai)</span>
                    </div>
                    <button onclick="buyGerinda()">Beli</button>
                </div>
            </div>
        </div>
        
        <!-- PASAR SCREEN -->
        <div id="pasar-screen" class="screen">
            <div class="header">
                <button class="back-btn" data-tab="meja">◀</button>
                <h3>🤝 Pasar Pemain</h3>
                <div></div>
            </div>
            <div class="pasar-tabs">
                <button class="pasar-tab active" data-pasar="beli">🛒 Beli</button>
                <button class="pasar-tab" data-pasar="jual">📦 Jual</button>
            </div>
            <div class="pasar-list" id="pasarList">
                <p style="text-align:center;padding:20px;">Memuat listing...</p>
            </div>
        </div>
        
    </div>
    
    <!-- SCRIPT UTAMA -->
    <script src="script.js"></script>
    
    <!-- NAVIGASI -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Tombol navigasi bawah
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.getAttribute('data-tab');
                    if (tab === 'meja') showScreen('main-screen');
                    else if (tab === 'inventory') showScreen('inventory-screen');
                    else if (tab === 'toko') showScreen('toko-screen');
                    else if (tab === 'pasar') showScreen('pasar-screen');
                    
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
            
            // Tombol back
            document.querySelectorAll('.back-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    showScreen('main-screen');
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector('.nav-btn[data-tab="meja"]').classList.add('active');
                });
            });
            
            // Tab Pasar
            document.querySelectorAll('.pasar-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.pasar-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    const type = this.getAttribute('data-pasar');
                    if (type === 'beli' && typeof loadPasarBeli === 'function') {
                        loadPasarBeli();
                    } else if (type === 'jual' && typeof loadPasarJual === 'function') {
                        loadPasarJual();
                    }
                });
            });
        });
        
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'inventory-screen' && typeof loadInventory === 'function') {
                loadInventory();
            }
            if (screenId === 'pasar-screen' && typeof loadPasarBeli === 'function') {
                loadPasarBeli();
            }
        }
        
        function showTab(tab) {
            if (tab === 'meja') showScreen('main-screen');
            else if (tab === 'inventory') showScreen('inventory-screen');
            else if (tab === 'toko') showScreen('toko-screen');
            else if (tab === 'pasar') showScreen('pasar-screen');
        }
        
        function buyBatu(amount) {
            if (typeof window.buyBatu === 'function') {
                window.buyBatu(amount);
            } else {
                alert('Fitur sedang dimuat...');
            }
        }
        
        function buyGerinda() {
            if (typeof window.buyGerinda === 'function') {
                window.buyGerinda();
            } else {
                alert('Fitur sedang dimuat...');
            }
        }
    </script>
</body>
</html>
